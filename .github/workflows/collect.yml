name: 采集数据集

on:
  # 每天 UTC 0:00 自动运行
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      categories:
        description: '要采集的类别 (all/positive/negative，或指定如 data_center_fire,smoke)'
        required: false
        default: 'all'
      max_per_keyword:
        description: '每个关键词采集数量'
        required: false
        default: '300'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 检出新仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 配置 Git
        run: |
          git config user.name "Dataset Collector"
          git config user.email "collector@github.com"

      - name: 初始化子模块（如果需要）
        run: |
          git submodule update --init --recursive || true

      - name: 统计现有数据
        id: stats_before
        run: |
          echo "采集前统计:"
          if [ -d "dataset" ]; then
            find dataset -name "*.jpg" -o -name "*.png" | wc -l || echo "0"
          else
            echo "0"
          fi

      - name: 运行采集脚本
        id: collect
        run: |
          echo "开始采集..."
          python src/collector.py

      - name: 统计采集后数据
        id: stats_after
        run: |
          echo "采集后统计:"
          TOTAL=$(find dataset -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l)
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "本次新增: $TOTAL 张图片"

      - name: 统计各类别
        run: |
          echo ""
          echo "=== 各类别统计 ==="
          for type in positive negative; do
            if [ -d "dataset/$type" ]; then
              echo "[$type]"
              for dir in dataset/$type/*/; do
                if [ -d "$dir" ]; then
                  name=$(basename "$dir")
                  count=$(find "$dir" -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l)
                  echo "  $name: $count"
                fi
              done
            fi
          done

      - name: 提交数据
        run: |
          # 添加所有文件
          git add dataset/ logs/ src/ config.py
          git status

          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "没有新数据需要提交"
          else
            echo "提交数据..."
            git commit -m "数据更新 $(date +'%Y-%m-%d %H:%M')" || true
            git push origin main || echo "推送失败（可能没有权限）"
          fi

      - name: 上传数据集到 LFS
        if: steps.stats_after.outputs.total > 0
        run: |
          # 跟踪大文件
          git lfs track "dataset/**/*.jpg"
          git lfs track "dataset/**/*.png"
          git add .gitattributes
          git commit -m "配置 LFS" || true
          git push origin main || true

  # 批量采集任务 - 分散到多天
  collect_batch_1:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: false  # 禁用，需要时手动开启
    strategy:
      matrix:
        category:
          - data_center_fire
          - wire_aging

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 采集正样本
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from collector import DatasetCollector
          collector = DatasetCollector()
          # 只采集指定类别
          print('采集 ${{ matrix.category }}')
          "
      - name: 提交
        run: |
          git add dataset/
          git commit -m "批量更新 ${{ matrix.category }}" || true
          git push || true