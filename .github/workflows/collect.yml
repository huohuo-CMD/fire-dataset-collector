name: 采集数据集

on:
  # 每天 UTC 0:00 自动运行
  schedule:
    - cron: '0 0 * * *'
  # 每次 push 到 main 分支自动运行
  push:
    branches:
      - main
  # 手动触发（默认运行全部）
  workflow_dispatch:

jobs:
  # 主采集任务
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 检出新仓库
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 配置 Git LFS
        run: |
          git lfs install
          git lfs track "dataset/**/*.jpg"
          git lfs track "dataset/**/*.png"

      - name: 配置 Git
        run: |
          git config user.name "Dataset Collector"
          git config user.email "collector@github.com"

      - name: 统计现有数据
        run: |
          echo "采集前统计:"
          find dataset -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l || echo "0"

      - name: 运行采集脚本
        run: |
          echo "开始采集..."
          cd src && python collector.py

      - name: 统计采集后数据
        run: |
          echo ""
          echo "=== 采集后统计 ==="
          TOTAL=$(find dataset -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l)
          echo "总计: $TOTAL 张图片"
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: 统计各类别
        run: |
          echo ""
          echo "=== 各类别统计 ==="
          for type in positive negative; do
            if [ -d "dataset/$type" ]; then
              echo "[$type]"
              for dir in dataset/$type/*/; do
                if [ -d "$dir" ]; then
                  name=$(basename "$dir")
                  count=$(find "$dir" -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l)
                  echo "  $name: $count"
                fi
              done
            fi
          done

      - name: 提交数据
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 确保 GITHUB_TOKEN 可用
          echo "当前目录:"
          pwd
          ls -la

          # 检查数据集
          if [ -d "dataset" ]; then
            echo "数据集大小:"
            du -sh dataset 2>/dev/null || echo "空"
            echo "图片数量:"
            find dataset -name "*.jpg" -o -name "*.png" 2>/dev/null | wc -l
          fi

          # 配置 Git
          git config user.name "Dataset Collector"
          git config user.email "collector@github.com"
          git config --global diff.lfs.textconv cat

          # 添加文件
          git add .gitattributes 2>/dev/null || true
          git add dataset/ 2>/dev/null || true
          git add logs/ 2>/dev/null || true

          # 检查变更
          if git diff --cached --quiet; then
            echo "没有新数据需要提交"
          else
            echo "提交并推送..."
            echo "变更文件:"
            git status

            # 尝试提交（使用 HTTPS + token）
            git commit -m "数据更新 $(date +'%Y-%m-%d %H:%M')" || echo "提交失败"

            # 使用 token 推送
            git push https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git main || echo "推送失败"
            echo "完成"
          fi

  # 并行采集任务 - 10 路同时采集
  collect_parallel:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        category:
          - data_center_fire
          - wire_aging
          - battery_failure
          - smoke
          - equipment_overheat
          - electric_arc
          - normal_light
          - normal_device
          - static_discharge
          - sunlight_reflection

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          git lfs install
          git lfs track "dataset/**/*.jpg"
          git lfs track "dataset/**/*.png"

      - name: 采集指定类别
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.collector import DatasetCollector
          from config import CATEGORIES

          collector = DatasetCollector()
          category = '${{ matrix.category }}'

          # 查找类别所在
          for ctype, categories in CATEGORIES.items():
              if category in categories:
                  info = categories[category]
                  result = collector.process_category(category, info, ctype)
                  print(f'完成: {category}')
                  break
          "

      - name: 提交数据
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Dataset Collector"
          git config user.email "collector@github.com"

          # 添加文件
          git add .gitattributes dataset/ || true

          # 检查变更
          if git diff --cached --quiet; then
            echo "没有新数据"
          else
            echo "提交..."
            git commit -m "并行采集: ${{ matrix.category }}" || echo "提交失败"
            git push https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git main || echo "推送失败"
          fi